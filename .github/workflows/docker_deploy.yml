name: blue_green_deploy

on:
  push:
    branches: [ "develop" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 환경변수(.env) 파일 생성
        run: |
          touch .env
          echo "SERVER_DB_URL=${{ secrets.SERVER_DB_URL }}" >> .env
          echo "SERVER_DB_USERNAME=${{ secrets.SERVER_DB_USERNAME }}" >> .env
          echo "SERVER_DB_PASSWORD=${{ secrets.SERVER_DB_PASSWORD }}" >> .env
          echo "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" >> .env
          echo "KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}" >> .env
          echo "SPRING_AI_OPENAI_API_KEY=${{ secrets.SPRING_AI_OPENAI_API_KEY }}" >> .env
          echo "JWT_KEY=${{ secrets.JWT_KEY }}" >> .env
          echo "JWT_ACCESS_TOKEN_EXPIRATION=${{ secrets.JWT_ACCESS_TOKEN_EXPIRATION }}" >> .env
          echo "JWT_REFRESH_TOKEN_EXPIRATION=${{ secrets.JWT_REFRESH_TOKEN_EXPIRATION }}" >> .env
          echo "SERVER_BASE_URL=${{ secrets.SERVER_BASE_URL }}" >> .env
          echo "SCRAPER_API_TOKEN=${{ secrets.SCRAPER_API_TOKEN }}" >> .env
          echo "SCRAPER_BASE_URL=${{ secrets.SCRAPER_BASE_URL }}" >> .env
          echo "SCRAPER_OUTPUT_URL=${{ secrets.SCRAPER_OUTPUT_URL }}" >> .env
          echo "S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}" >> .env
          echo "S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}" >> .env
          echo "S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}" >> .env
          echo "FRONT_LOCAL_URL=${{ secrets.FRONT_LOCAL_URL }}" >> .env
          echo "FRONT_BASE_URL=${{ secrets.FRONT_BASE_URL }}" >> .env
          echo "SPRING_AI_MAX_TOKENS=${{ secrets.SPRING_AI_MAX_TOKENS }}" >> .env

      - name: gradlew 실행권한 설정
        run: chmod +x gradlew

      - name: Gradle 빌드
        uses: gradle/gradle-build-action@v3
        with:
          arguments: clean build -x test

      - name: 빌드 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: OditServer
          path: build/libs/*.jar
          retention-days: 1
          compression-level: 0

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드
        run: docker build --platform linux/amd64 -t ${{ secrets.DOCKERHUB_USERNAME }}/live_server .

      - name: Docker 이미지 푸시
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/live_server:latest


  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Blue/Green 활성 환경 감지 (포트 8080/8081)
        run: |
          BLUE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ secrets.EC2_HOST }}:8080/actuator/health" || echo "000")
          GREEN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ secrets.EC2_HOST }}:8081/actuator/health" || echo "000")
          
          if [[ "$BLUE_STATUS" =~ ^(200|401)$ ]]; then
            CURRENT_UPSTREAM=blue; CURRENT_PORT=8080; TARGET_UPSTREAM=green; TARGET_PORT=8081
          else
            CURRENT_UPSTREAM=green; CURRENT_PORT=8081; TARGET_UPSTREAM=blue; TARGET_PORT=8080
          fi
          
          echo "CURRENT_UPSTREAM=$CURRENT_UPSTREAM" >> $GITHUB_ENV
          echo "CURRENT_PORT=$CURRENT_PORT"     >> $GITHUB_ENV
          echo "TARGET_UPSTREAM=$TARGET_UPSTREAM" >> $GITHUB_ENV
          echo "TARGET_PORT=$TARGET_PORT"       >> $GITHUB_ENV
          echo "::debug::Detected $CURRENT_UPSTREAM (port $CURRENT_PORT), targeting $TARGET_UPSTREAM (port $TARGET_PORT)"

      - name: 이전 대상 컨테이너 정리
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu
            sudo docker-compose -f docker-compose-${{ env.TARGET_UPSTREAM }}.yml down --remove-orphans || true
            sudo docker network prune -f

      - name: 새 대상 컨테이너 배포
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/live_server:latest
            sudo docker-compose -f docker-compose-${{ env.TARGET_UPSTREAM }}.yml up -d

      - name: 새 컨테이너 헬스 체크
        run: |
          for i in {1..12}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ secrets.EC2_HOST }}:${{ env.TARGET_PORT }}/actuator/health" || echo "000")
            if [[ "$HTTP_CODE" =~ ^(200|401)$ ]]; then
              echo "::debug::Health check passed with code $HTTP_CODE"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Health check failed after retries"
          exit 1

      - name: Nginx 업스트림 전환
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker exec nginxserver bash -c \
              'echo "set \$service_url '"${{ env.TARGET_UPSTREAM }}"';" > /etc/nginx/conf.d/service-env.inc && nginx -s reload'

      - name: 상태 파일 동기화
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ env.TARGET_UPSTREAM }}" > /home/ubuntu/.current_upstream
            chmod 644 /home/ubuntu/.current_upstream

      - name: 이전 컨테이너 정리
        if: success()
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu
            sudo docker-compose -f docker-compose-${{ env.CURRENT_UPSTREAM }}.yml down || true

      # 8. 최종 알림
      - name: Blue/Green 배포 완료 알림
        run: |
          echo "✅ Deployed to ${{ env.TARGET_UPSTREAM }} (was ${{ env.CURRENT_UPSTREAM }})"
          echo "Ports: ${{ env.CURRENT_PORT }} → ${{ env.TARGET_PORT }}"
