name: blue_green_deploy

on:
  push:
    branches: [ "develop" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: Gradle Clean
        run: ./gradlew clean

      - name: 🏗️ Gradle 빌드
        run: ./gradlew build -x test
        env:
          SERVER_DB_URL: ${{ secrets.SERVER_DB_URL }}
          SERVER_DB_USERNAME: ${{ secrets.SERVER_DB_USERNAME }}
          SERVER_DB_PASSWORD: ${{ secrets.SERVER_DB_PASSWORD }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          SPRING_AI_OPENAI_API_KEY: ${{ secrets.SPRING_AI_OPENAI_API_KEY }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          JWT_ACCESS_TOKEN_EXPIRATION: ${{ secrets.JWT_ACCESS_TOKEN_EXPIRATION }}
          JWT_REFRESH_TOKEN_EXPIRATION: ${{ secrets.JWT_REFRESH_TOKEN_EXPIRATION }}
          SERVER_BASE_URL: ${{ secrets.SERVER_BASE_URL }}
          SCRAPER_API_TOKEN: ${{ secrets.SCRAPER_API_TOKEN }}
          SCRAPER_BASE_URL: ${{ secrets.SCRAPER_BASE_URL }}
          SCRAPER_OUTPUT_URL: ${{ secrets.SCRAPER_OUTPUT_URL }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          FRONT_LOCAL_URL: ${{ secrets.FRONT_LOCAL_URL }}
          FRONT_BASE_URL: ${{ secrets.FRONT_BASE_URL }}
          SPRING_AI_MAX_TOKENS: ${{ secrets.SPRING_AI_MAX_TOKENS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: 빌드 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: OditServer
          path: build/libs/*.jar
          retention-days: 1
          compression-level: 0

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드
        run: docker build --platform linux/amd64 -t ${{ secrets.DOCKERHUB_USERNAME }}/live_server .

      - name: Docker 이미지 푸시
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/live_server:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Blue/Green 활성 환경 감지 (포트 8080/8081)
        run: |
          echo "::group::환경 감지 시작"
          BLUE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ secrets.EC2_HOST }}:8080/actuator/health" || echo "000")
          GREEN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ secrets.EC2_HOST }}:8081/actuator/health" || echo "000")
          
          echo "🔍 포트 상태 확인: Blue(8080)=$BLUE_STATUS, Green(8081)=$GREEN_STATUS"
          
          if [[ "$BLUE_STATUS" =~ ^(200|401)$ ]]; then
            CURRENT_UPSTREAM=blue; CURRENT_PORT=8080; TARGET_UPSTREAM=green; TARGET_PORT=8081
          else
            CURRENT_UPSTREAM=green; CURRENT_PORT=8081; TARGET_UPSTREAM=blue; TARGET_PORT=8080
          fi
          
          echo "CURRENT_UPSTREAM=$CURRENT_UPSTREAM" >> $GITHUB_ENV
          echo "CURRENT_PORT=$CURRENT_PORT" >> $GITHUB_ENV
          echo "TARGET_UPSTREAM=$TARGET_UPSTREAM" >> $GITHUB_ENV
          echo "TARGET_PORT=$TARGET_PORT" >> $GITHUB_ENV
          
          echo "🎯 현재 활성: $CURRENT_UPSTREAM (포트 $CURRENT_PORT)"
          echo "🚀 배포 대상: $TARGET_UPSTREAM (포트 $TARGET_PORT)"
          echo "::endgroup::"

      - name: 대상 환경 컨테이너 완전 정리
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/ubuntu
            
            echo "::group::환경 정리"
            echo "🧹 ${{ env.TARGET_UPSTREAM }} 환경 정리 시작"
            
            # 컨테이너 충돌 방지를 위한 강제 정리
            echo "🔍 기존 컨테이너 확인 중..."
            EXISTING_CONTAINERS=$(sudo docker ps -aq --filter "name=${{ env.TARGET_UPSTREAM }}")
            if [ -n "$EXISTING_CONTAINERS" ]; then
              echo "🛑 기존 컨테이너 강제 종료: $EXISTING_CONTAINERS"
              sudo docker stop $EXISTING_CONTAINERS || true
              sudo docker rm  $EXISTING_CONTAINERS || true
            fi
            
            # docker-compose로도 정리
            sudo docker-compose -f docker-compose-${{ env.TARGET_UPSTREAM }}.yml down || true
            
            # 네트워크 정리
            sudo docker network prune -f
            
            # 시스템 안정화 대기
            sleep 10
            echo "✅ ${{ env.TARGET_UPSTREAM }} 환경 정리 완료"
            echo "::endgroup::"

      - name: 새 대상 컨테이너 배포
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /home/ubuntu
            
            echo "::group::새 환경 배포"
            echo "🚀 ${{ env.TARGET_UPSTREAM }} 환경 배포 시작"
            
            # 최신 이미지 풀
            echo "📥 최신 Docker 이미지 다운로드"
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/live_server:latest
            
            # 리소스 제한 추가 (수정된 Python 스크립트)
            if ! grep -q "deploy:" docker-compose-${{ env.TARGET_UPSTREAM }}.yml; then
              echo "⚙️ 리소스 제한 설정 추가"
              cp docker-compose-${{ env.TARGET_UPSTREAM }}.yml docker-compose-${{ env.TARGET_UPSTREAM }}.yml.bak
            
              python3 << 'EOPY'
            import yaml
            import sys
            import os
            
            compose_file = 'docker-compose-${{ env.TARGET_UPSTREAM }}.yml'
            
            try:
                with open(compose_file, 'r') as f:
                    data = yaml.safe_load(f)
            
                if 'services' not in data:
                    data['services'] = {}
            
                for service_name in data.get('services', {}):
                    if 'deploy' not in data['services'][service_name]:
                        data['services'][service_name]['deploy'] = {
                            'resources': {
                                'limits': {'cpus': '1.0', 'memory': '1G'},
                                'reservations': {'memory': '512M'}
                            }
                        }
                    print(f"✅ {service_name} 서비스에 리소스 제한 추가")
            
                with open(compose_file, 'w') as f:
                    yaml.dump(data, f, default_flow_style=False, allow_unicode=True, indent=2)
            
                print("📝 YAML 수정 완료")
            
            except Exception as e:
                print(f"⚠️ YAML 수정 실패: {e}")
                print("🔄 기존 설정으로 배포 계속 진행")
                if os.path.exists(f'{compose_file}.bak'):
                    os.rename(f'{compose_file}.bak', compose_file)
            EOPY
            else
              echo "ℹ️ 리소스 제한이 이미 설정되어 있습니다"
            fi
            
            # 새 컨테이너 시작
            echo "🆙 ${{ env.TARGET_UPSTREAM }} 컨테이너 시작"
            sudo docker-compose -f docker-compose-${{ env.TARGET_UPSTREAM }}.yml up -d
            
            # 컨테이너 상태 확인
            sleep 15
            echo "📊 컨테이너 상태 확인:"
            sudo docker ps --filter "name=${{ env.TARGET_UPSTREAM }}" --format "table {{.Names}}\t{{.Status}}"
            
            echo "✅ ${{ env.TARGET_UPSTREAM }} 환경 배포 완료"
            echo "::endgroup::"

      - name: 새 컨테이너 상세 헬스 체크
        run: |
          echo "::group::헬스체크 진행"
          echo "🏥 ${{ env.TARGET_UPSTREAM }} 환경 헬스체크 시작 (포트 ${{ env.TARGET_PORT }})"
          
          START_TIME=$(date +%s)
          
          for i in {1..10}; do
            CURRENT_TIME=$(date '+%H:%M:%S')
            echo "🔍 헬스체크 시도 ${i}/10 ($CURRENT_TIME)"
          
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ secrets.EC2_HOST }}:${{ env.TARGET_PORT }}/actuator/health" || echo "000")
          
            if [[ "$HTTP_CODE" == "200" ]]; then
              ELAPSED=$(($(date +%s) - START_TIME))
              echo "✅ 헬스체크 성공 (HTTP 200) - 서비스 정상 동작 확인 (소요시간: ${ELAPSED}초)"
              echo "::endgroup::"
              exit 0
            elif [[ "$HTTP_CODE" == "401" ]]; then
              ELAPSED=$(($(date +%s) - START_TIME))
              echo "⚠️ 헬스체크 인증 필요 (HTTP 401) - 서버는 정상 응답 중 (소요시간: ${ELAPSED}초)"
              echo "::endgroup::"
              exit 0
            else
              echo "❌ 헬스체크 실패 (HTTP $HTTP_CODE) - 20초 후 재시도"
              sleep 20
            fi
          done
          
          echo "🚨 헬스체크 15회 실패 - 배포 중단합니다"
          echo "::endgroup::"
          exit 1

      - name: Nginx 업스트림 전환
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "::group::Nginx 전환"
            echo "🔄 Nginx 업스트림을 ${{ env.TARGET_UPSTREAM }}로 전환 시작"
            
            # 현재 설정 백업
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            sudo docker exec nginxserver cp /etc/nginx/conf.d/service-env.inc /etc/nginx/conf.d/service-env.inc.bak.$TIMESTAMP 2>/dev/null || true
            
            # 새 설정 적용
            sudo docker exec nginxserver bash -c \
              'echo "set \$service_url ${{ env.TARGET_UPSTREAM }};" > /etc/nginx/conf.d/service-env.inc'
            
            # 설정 검증 후 적용
            if sudo docker exec nginxserver nginx -t; then
              sudo docker exec nginxserver nginx -s reload
              echo "✅ Nginx 업스트림 전환 완료: ${{ env.TARGET_UPSTREAM }}"
            
              # 전환 확인
              sleep 5
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ secrets.EC2_HOST }}" || echo "000")
              echo "🌐 메인 서비스 응답 확인: HTTP $HTTP_STATUS"
            else
              echo "❌ Nginx 설정 오류 - 이전 설정으로 복구"
              sudo docker exec nginxserver cp /etc/nginx/conf.d/service-env.inc.bak.$TIMESTAMP /etc/nginx/conf.d/service-env.inc 2>/dev/null || true
              sudo docker exec nginxserver nginx -s reload
              exit 1
            fi
            echo "::endgroup::"

      - name: 상태 파일 동기화
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📝 상태 파일 업데이트: ${{ env.TARGET_UPSTREAM }}"
            echo "${{ env.TARGET_UPSTREAM }}" > /home/ubuntu/.current_upstream
            chmod 644 /home/ubuntu/.current_upstream
            echo "✅ 상태 파일 업데이트 완료"

      - name: 이전 환경 정리
        if: success()
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "::group::이전 환경 정리"
            echo "🧹 이전 환경 ${{ env.CURRENT_UPSTREAM }} 정리 시작"
            
            # 안정화 대기
            sleep 30
            
            # 이전 환경 정리
            CURRENT_CONTAINERS=$(sudo docker ps -q --filter "name=${{ env.CURRENT_UPSTREAM }}")
            if [ -n "$CURRENT_CONTAINERS" ]; then
              echo "🛑 ${{ env.CURRENT_UPSTREAM }} 컨테이너 graceful 종료"
              sudo docker stop --time=30 $CURRENT_CONTAINERS
              sudo docker rm $CURRENT_CONTAINERS
            fi
            
            sudo docker-compose -f docker-compose-${{ env.CURRENT_UPSTREAM }}.yml down || true
            echo "✅ 이전 환경 정리 완료"
            echo "::endgroup::"

      - name: Blue/Green 배포 완료 및 결과 확인
        run: |
          echo "::group::배포 결과"
          echo "🎉 Blue/Green 배포가 성공적으로 완료되었습니다!"
          echo ""
          echo "📊 배포 결과 요약:"
          echo "  ├─ 이전 환경: ${{ env.CURRENT_UPSTREAM }} (포트 ${{ env.CURRENT_PORT }})"
          echo "  ├─ 신규 환경: ${{ env.TARGET_UPSTREAM }} (포트 ${{ env.TARGET_PORT }})"
          echo "  ├─ 전환 방향: ${{ env.CURRENT_PORT }} → ${{ env.TARGET_PORT }}"
          echo "  └─ Nginx 업스트림: ${{ env.TARGET_UPSTREAM }}"
          echo ""
          echo "🔗 서비스 확인: http://${{ secrets.EC2_HOST }}"
          echo "⏰ 배포 완료 시간: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "::endgroup::"
