# 서버환경입니다. application-blue.yml

server:
  shutdown: graceful
  port: 8081
  address: 0.0.0.0

spring:
  config:
    import: optional:file:/home/${EC2_USERNAME}/.env[.properties]
    activate:
      on-profile: green
  datasource:
    url: ${SERVER_DB_URL}
    username: ${SERVER_DB_USERNAME}
    password: ${SERVER_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        hbm2ddl:
          auto: update
        default_batch_fetch_size: 1000
  lifecycle:
    timeout-per-shutdown-phase: 30s
redirect:
  url: ${FRONT_BASE_URL}/login/kakao
